<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} — AQW MELAYU</title>
    <meta name="description" content="AQW MELAYU Bot Admin Dashboard">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="layout">
        <!-- Sidebar -->
        <nav class="sidebar">
            <div class="sidebar-brand">
                <h1>AQW MELAYU</h1>
                <span>Bot Dashboard</span>
            </div>
            <ul class="sidebar-nav">
                <li>
                    <a href="{{ url_for('index') }}" class="{% if active_page == 'dashboard' %}active{% endif %}">
                        <span class="nav-icon">📊</span> Overview
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('verified_users') }}" class="{% if active_page == 'verified_users' %}active{% endif %}">
                        <span class="nav-icon">✅</span> Verified Users
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('tickets') }}" class="{% if active_page == 'tickets' %}active{% endif %}">
                        <span class="nav-icon">🎟️</span> Tickets
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('leaderboard') }}" class="{% if active_page == 'leaderboard' %}active{% endif %}">
                        <span class="nav-icon">🏆</span> Leaderboard
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('helper_apps') }}" class="{% if active_page == 'helper_apps' %}active{% endif %}">
                        <span class="nav-icon">🛡️</span> Helper Apps
                    </a>
                </li>
                <li>
                    <a href="{{ url_for('settings') }}" class="{% if active_page == 'settings' %}active{% endif %}">
                        <span class="nav-icon">⚙️</span> Settings
                    </a>
                </li>
            </ul>
            <div class="sidebar-user">
                {% if user %}
                <img src="https://cdn.discordapp.com/avatars/{{ user.id }}/{{ user.avatar }}.png?size=64" alt="avatar">
                <div class="sidebar-user-info">
                    <div class="name">{{ user.global_name or user.username }}</div>
                    <div class="role">Officer</div>
                </div>
                <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
                {% endif %}
            </div>
        </nav>

        <!-- Main Content -->
        <main class="main-content">
            {% block content %}{% endblock %}
        </main>
    </div>
    <script src="{{ url_for('static', filename='dashboard.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
